plugins {
    id 'com.android.application'
}
android {
    namespace 'com.example.modloader'
    compileSdk 33
    defaultConfig {
        applicationId "com.example.modloader"
        minSdk 21
        targetSdk 33
        ndk { abiFilters 'arm64-v8a', 'armeabi-v7a' }
    }
    sourceSets {
        main.jniLibs.srcDirs = ['src/main/jniLibs']
    }
}
dependencies {}